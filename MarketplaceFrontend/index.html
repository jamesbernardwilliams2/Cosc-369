<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>marketplacefrontend</title>
  <script src="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.js"></script>
  <link type="text/css" rel="stylesheet" href="https://www.gstatic.com/firebasejs/ui/6.0.1/firebase-ui-auth.css" />
  <link type="text/css" rel="stylesheet" href="./src/style.css" />
  <script type="module" src="/src/main.js"></script>
</head>

<body>

  <header class="top-bar">
    <a href="#" class="logo">Student Marketplace</a>

    <div class="search-container">
      <input type="text" class="search-bar" placeholder="Search for items (e.g. Vintage Camera)...">
    </div>

    <div class="nav-buttons">
      <span id="authCorner"><button class="btn-auth" id="login">Register / Sign In</button></span>
    </div>
  </header>

  <main class="container">
    <h2 class="dashboard-header">Product Listings</h2>

    <div class="item-grid" id="item-grid">
    </div>
  </main>

  <!-- List Item Modal -->
  <div id="listItemModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>List a New Item</h2>
        <button class="close-btn">&times;</button>
      </div>
      <form id="listItemForm" class="modal-form">
        <div class="form-group">
          <label for="itemName">Item Name *</label>
          <input type="text" id="itemName" name="itemName" required>
        </div>

        <div class="form-group">
          <label for="itemDescription">Description *</label>
          <textarea id="itemDescription" name="itemDescription" rows="4" required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="itemQuantity">Quantity *</label>
            <input type="number" id="itemQuantity" name="itemQuantity" min="1" required>
          </div>
          <div class="form-group">
            <label for="itemPrice">Price *</label>
            <input type="number" id="itemPrice" name="itemPrice" min="1" required>
          </div>
        </div>
        <div class="form-group">
          <label for="itemCategory">Category *</label>
          <select id="itemCategory" name="itemCategory" required>
            <option value="">Select a category</option>
            <option value="electronics">Electronics</option>
            <option value="books">Books</option>
            <option value="clothing">Clothing</option>
            <option value="furniture">Furniture</option>
            <option value="sports">Sports & Outdoors</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="itemImage">Image (Optional)</label>
          <input type="file" id="itemImage" name="itemImage" accept="image/*">
          <small>Supported formats: JPG, PNG, GIF</small>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancel">Cancel</button>
          <button type="submit" class="btn-submit">List Item</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Product Details Modal -->
  <div id="productModal" class="modal">
    <div id="productContent" class="modal-content">
      <div class="modal-header">
        <h2 id="productTitle">Product Details</h2>
        <button class="close-btn" id="closeProductModal">&times;</button>
      </div>
      <div id="productDetails" class="modal-body">
        <!-- Product info will be populated here -->
      </div>
      <div class="modal-footer">
        <div class="quantity-controls">
          <button type="button" class="quantity-btn" id="decreaseQty">-</button>
          <span class="quantity-display" id="quantityDisplay">1</span>
          <button type="button" class="quantity-btn" id="increaseQty">+</button>
        </div>
        <button type="button" class="btn-cancel" id="cancelBuy">Cancel</button>
        <button type="button" class="btn-submit" id="buyButton">Buy Now</button>
      </div>
    </div>
  </div>

</body>

</html>
